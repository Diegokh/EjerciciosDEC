<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="/css/css.css" type="text/css">
  </head>
  <body class="container">


    <div class="text-center my-3">
        <h1 class="text-primary text-decoration-none">jQuery CRUD</h1>
    </div>


    
    <br>
    <br>

    <div class="row">
        <div class="col-md-4 text-center">
            <img src="/img/jqueryimg.png" class="img-fluid border" alt="jQuery Image"/>
        </div>

        <div class="col-md-8">
            <form id="form-guardar" class="border border-secondary p-3 rounded">
                <h2 class="text-center">CREAR TAREA</h2>
                <div class="mb-2">
                    <label for="titulo-cr" class="form-label">Título:</label>
                    <input id="titulo-cr" type="text" name="titulo-cr" class="form-control" />
                </div>
                <div id="alertDiv"></div>
                <div class="mb-2">
                    <label for="desc-cr" class="form-label">Descripción:</label>
                    <input id="desc-cr" type="text" name="titulo-cr" class="form-control"/>
                </div>
                <div id="alertDivDesc"></div>
                <button id="btn-guardar" type="button" class="btn btn-primary w-100">Guardar</button>
                <div id="envioGuardado"></div>
            </form>
            
        </div>
    </div>

    <br>
    <br>

    <div class="row mt-4">
        <div class="col-md-7">
            <div class="border border-secondary p-3 rounded">
                <h2 class="text-center">MOSTRAR TAREAS</h2>
                <table id="tabl-acc" class="table table-bordered text-center">
                    <thead class="table-light">
                        <tr>
                            <th>TÍTULO</th>
                            <th>DESCRIPCIÓN</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>

                        </tr>
                    </tbody>
                </table>
            </div>
        </div>



        <div class="col-md-5">
            <form id="form-act" class="border border-secondary p-3 rounded">
                <h2 class="text-center">ACTUALIZAR TAREAS</h2>
                <div class="mb-2">
                    <label for="titulo-ac" class="form-label">Título:</label>
                    <input id="titulo-ac" type="text" name="titulo-ac" class="form-control"/>
                </div>
                <div id="alertDivTitAct"></div>
                <div class="mb-2">
                    <label for="desc-ac" class="form-label">Descripción:</label>
                    <input id="desc-ac" type="text" name="desc-ac" class="form-control"/>
                </div>
                <div id="alertDivDescAct"></div>
                <button id="btn-ac" type="button" class="btn btn-success w-100">Actualizar</button>
                <div id="tareaAct"></div>
            </form>
        </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
