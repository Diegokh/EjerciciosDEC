<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    
        <h2>Validar con Eventos y Expresiones Regulares</h2>
        <p>Introduce los datos y pulsa Comprobar</p>

        <form id="miForm">

            <label for="dni">DNI:</label>
            <input type="text" name="dni" id="dni" placeholder="00.000.000-A">
            <p id="error-dni"></p>
            <br><br>

            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" size="40">
            <p id="error-nombre"></p>
            <br><br>

            <label for="fecha">Fecha de Nacimiento:</label>
            <input type="text" name="fecha" id="fecha" placeholder="dd/mm/aaaa">
            <p id="error-fecha"></p>
            <br><br>

            <label for="email">Email:</label>
            <input type="text" name="email" id="email" placeholder="ejemplo@hola.com">
            <p id="error-email"></p>
            <br><br>

            <label for="web">Página WEB:</label>
            <input type="text" name="web" id="web" placeholder="https://www.ejemplo.com">
            <p id="error-web"></p>
            <br><br>

            <label for="password">Contraseña:</label>
            <input type="password" name="contraseña" id="password">
            <p id="error-password"></p>
            <br><br>

            <button type="submit">Comprobar</button>
        </form>

        <script src="js.js"></script>

</body>

</html>
