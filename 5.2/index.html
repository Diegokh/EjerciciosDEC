<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Trabajando con this</h1>

    <form>
        <label for="nombre">Nombre: </label>
        <input type="text" name="nombre" id="nombre" value="Diego">

        <br>
        <br>

        <label for="apellidos">Apellidos: </label>
        <input type="text" name="apellidos" id="apellidos" value="Blanque Saavedra">

        <br>
        <br>

        <label for="edad">Edad: </label>
        <input type="text" name="edad" id="edad" value="21">

        <br>
        <br>

        <label for="passwd">Constraseña: </label>
        <input type="password" name="Constraseña" id="passwd" value="12345">

        <br>
        <br>

        <label for="pais">Pais: </label>
        <input type="radio" name="pais" id="espana" value="España" >España
        <input type="radio" name="pais" id="francia" value="francia">Francia

        <br>
        <br>

        <p>Haga click en cada uno de los campos para ver mas informacion</p>

    </form>
    


    <script src="js.js"></script>
</body>
</html>
